server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://osf-api.zeroguess.ai wss://osf-api.zeroguess.ai http://192.168.178.150:* ws://192.168.178.150:*; img-src 'self' data: blob:; frame-ancestors 'none'; worker-src 'self' blob:" always;

    # Static HTML files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → gateway (strip /api prefix)
    location /api/ {
        proxy_pass http://osf-gateway.osf.svc.cluster.local:8012/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE support (for progress streaming)
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy /health → gateway
    location /health {
        proxy_pass http://osf-gateway.osf.svc.cluster.local:8012/health;
        proxy_set_header Host $host;
    }
}
