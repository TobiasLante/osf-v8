apiVersion: apps/v1
kind: Deployment
metadata:
  name: osf-kg-builder
  namespace: osf
  labels:
    app: osf-kg-builder
    version: v9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osf-kg-builder
  template:
    metadata:
      labels:
        app: osf-kg-builder
        version: v9
    spec:
      containers:
        - name: kg-builder
          image: 192.168.178.150:32000/osf-kg-builder:v9
          ports:
            - containerPort: 8035
          envFrom:
            - configMapRef:
                name: osf-config
            - secretRef:
                name: osf-secrets
          env:
            - name: PORT
              value: "8035"
            - name: MCP_PROXY_URL
              value: "http://osf-mcp-proxy:8034"
            - name: LLM_URL
              value: "http://192.168.178.120:5001"
          livenessProbe:
            httpGet:
              path: /health
              port: 8035
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8035
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: osf-kg-builder
  namespace: osf
  labels:
    app: osf-kg-builder
spec:
  selector:
    app: osf-kg-builder
  ports:
    - port: 8035
      targetPort: 8035
      protocol: TCP
