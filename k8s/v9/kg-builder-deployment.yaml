apiVersion: apps/v1
kind: Deployment
metadata:
  name: osf-kg-builder
  namespace: osf
  labels:
    app: osf-kg-builder
    version: "9.1.1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osf-kg-builder
  template:
    metadata:
      labels:
        app: osf-kg-builder
        version: "9.1.1"
    spec:
      containers:
        - name: kg-builder
          image: 192.168.178.150:32000/osf-kg-builder:9.1.1
          imagePullPolicy: Always
          command: ["node", "dist/server/index.js"]
          ports:
            - containerPort: 8035
          envFrom:
            - configMapRef:
                name: osf-config
            - secretRef:
                name: osf-secrets
          env:
            - name: PORT
              value: "8035"
            - name: NEO4J_URL
              value: "bolt://osf-neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: osf-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_DATABASE
              value: "neo4j"
            - name: EMBEDDING_URL
              value: "http://192.168.178.120:5003"
            - name: EMBEDDING_MODEL
              value: "nomic-embed-text"
            - name: EMBEDDING_DIM
              value: "768"
            - name: DOMAIN
              value: "discrete"
            - name: MCP_PROXY_URL
              value: "http://factory-v3-fertigung.factory.svc.cluster.local:8020"
            - name: HISTORIAN_URL
              value: "http://historian:8030"
            - name: ERP_DB_HOST
              value: "postgress-erp-svc.default"
            - name: ERP_DB_PORT
              value: "5432"
            - name: BIGDATA_DB_HOST
              value: "postgress-big-svc.bigdata"
            - name: BIGDATA_DB_PORT
              value: "5433"
            - name: QMS_DB_HOST
              value: "qms-postgres.default"
            - name: QMS_DB_PORT
              value: "5432"
            - name: WMS_DB_HOST
              value: "wms-warehouse-postgres.default"
            - name: WMS_DB_PORT
              value: "5432"
            - name: ERP_DB_NAME
              value: "erpdb"
            - name: ERP_DB_USER
              value: "admin"
            - name: ERP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: osf-secrets
                  key: FACTORY_DB_PASSWORD
            - name: DB_SCHEMA
              value: "llm_test_v3"
            - name: MQTT_RAW_URL
              value: "mqtt://192.168.178.150:31883"
            - name: BATCH_SIZE
              value: "10000"
            - name: BUILD_SCHEDULE_HOURS
              value: "9,19"
            - name: SCHEMA_POLL_INTERVAL_MS
              value: "3600000"
          livenessProbe:
            httpGet:
              path: /health
              port: 8035
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8035
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
