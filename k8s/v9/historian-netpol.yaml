## Historian — Network Policies (egress to PG + MQTT, ingress from Gateway)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-egress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: historian
  policyTypes:
    - Egress
  egress:
    # PG Factory (bigdata namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
      ports:
        - port: 5433
          protocol: TCP
    # MQTT Broker (demo namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: demo
      ports:
        - port: 1883
          protocol: TCP
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: historian
  policyTypes:
    - Ingress
  ingress:
    # Gateway + KG Server can reach Historian MCP
    - from:
        - podSelector:
            matchLabels:
              app: osf-gateway
        - podSelector:
            matchLabels:
              app: osf-kg-server
      ports:
        - port: 8030
          protocol: TCP
