# Historian — Network Policies
# Egress: PG (bigdata) + MQTT (demo)
# Ingress: Gateway + KG Builder
# Last updated: 2026-03-21
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-egress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: historian
  policyTypes:
    - Egress
  egress:
    # PG BigData (bigdata namespace, port 5433)
    - ports:
        - port: 5433
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
    # MQTT Broker (demo namespace, port 1883)
    - ports:
        - port: 1883
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: demo
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: historian-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: historian
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: osf-gateway
        - podSelector:
            matchLabels:
              app: osf-kg-builder
      ports:
        - port: 8030
          protocol: TCP
