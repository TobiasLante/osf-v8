apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: osf-neo4j
  namespace: osf
  labels:
    app: osf-neo4j
    version: v9
spec:
  serviceName: osf-neo4j
  replicas: 1
  selector:
    matchLabels:
      app: osf-neo4j
  template:
    metadata:
      labels:
        app: osf-neo4j
        version: v9
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: http
          env:
            - name: NEO4J_AUTH
              value: "neo4j/$(NEO4J_PASSWORD)"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: osf-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_server_memory_heap_max__size
              value: "1G"
            - name: NEO4J_server_memory_pagecache_size
              value: "512M"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: osf-neo4j
  namespace: osf
  labels:
    app: osf-neo4j
spec:
  selector:
    app: osf-neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
