apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kg-builder-egress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-kg-builder
  policyTypes:
    - Egress
  egress:
    # Neo4j (cluster-internal)
    - ports:
        - port: 7687
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app: osf-neo4j
    # Historian MCP (cluster-internal)
    - ports:
        - port: 8030
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app: historian
    # Factory MCP (factory namespace)
    - ports:
        - port: 8020
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: factory
    # PostgreSQL ClusterIP services (cross-namespace)
    - ports:
        - port: 5432
          protocol: TCP
        - port: 5433
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
    # LLM + Embedding servers (192.168.178.120)
    - ports:
        - port: 5001
          protocol: TCP
        - port: 5003
          protocol: TCP
      to:
        - ipBlock:
            cidr: 192.168.178.120/32
    # GitHub (schema repo sync)
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 0.0.0.0/0
    # MQTT broker (192.168.178.150:31883)
    - ports:
        - port: 31883
          protocol: TCP
      to:
        - ipBlock:
            cidr: 192.168.178.150/32
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
