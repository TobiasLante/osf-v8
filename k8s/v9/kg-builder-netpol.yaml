## KG Builder Job — Network Policies
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kg-builder-egress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-kg-builder
  policyTypes:
    - Egress
  egress:
    # Neo4j (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app: osf-neo4j
      ports:
        - port: 7687
          protocol: TCP
    # Factory PG (bigdata namespace, for kg_builder_runs)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
      ports:
        - port: 5433
          protocol: TCP
    # Factory Sim MCP (factory namespace, tool discovery + sampling)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: factory
      ports:
        - port: 8020
          protocol: TCP
    # Historian MCP (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app: historian
      ports:
        - port: 8030
          protocol: TCP
    # LLM Server (external .120, for schema planning + embeddings)
    - to:
        - ipBlock:
            cidr: 192.168.178.120/32
      ports:
        - port: 5001
          protocol: TCP
        - port: 5003
          protocol: TCP
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
