# KG Builder + Neo4j + v9-Web — Network Policies
# Note: KG Server = KG Builder (unified pod, app: osf-kg-builder)
# The service osf-kg-server points to osf-kg-builder pods via selector.
# Last updated: 2026-03-21
---
# KG Builder: allow ingress (NodePort 30035 from external + gateway MCP calls + v9-web)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: osf-kg-builder-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-kg-builder
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: osf-gateway
      ports:
        - port: 8035
          protocol: TCP
    # NodePort access (v9-web browser, external tools)
    - ports:
        - port: 8035
          protocol: TCP
---
# Neo4j: allow ingress from KG Builder only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: neo4j-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-neo4j
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: osf-kg-builder
      ports:
        - port: 7687
          protocol: TCP
        - port: 7474
          protocol: TCP
---
# v9 Web UI: allow ingress (NodePort 30909, static site)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: v9-web-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-v9-web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 80
          protocol: TCP
