## KG Server — Network Policies
## Note: osf namespace has default-deny-all, so explicit allow is required.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kg-server-egress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-kg-server
  policyTypes:
    - Egress
  egress:
    # Allow all egress (KG Server needs: Neo4j, PG, MQTT, LLM, GitHub, Gateway)
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kg-server-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-kg-server
  policyTypes:
    - Ingress
  ingress:
    # Allow all ingress (NodePort from external + gateway + UI)
    - {}
---
## Neo4j — allow ingress from KG Server + KG Builder
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: neo4j-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-neo4j
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: osf-kg-server
        - podSelector:
            matchLabels:
              app: osf-kg-builder
      ports:
        - port: 7687
          protocol: TCP
        - port: 7474
          protocol: TCP
---
## v9 Web — allow ingress (NodePort)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: v9-web-ingress
  namespace: osf
spec:
  podSelector:
    matchLabels:
      app: osf-v9-web
  policyTypes:
    - Ingress
  ingress:
    - {}
