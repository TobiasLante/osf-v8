apiVersion: apps/v1
kind: Deployment
metadata:
  name: osf-kg-agent
  namespace: osf
  labels:
    app: osf-kg-agent
    version: v9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osf-kg-agent
  template:
    metadata:
      labels:
        app: osf-kg-agent
        version: v9
    spec:
      containers:
        - name: kg-agent
          image: 192.168.178.150:32000/osf-kg-agent:v9
          ports:
            - containerPort: 8032
          envFrom:
            - configMapRef:
                name: osf-config
            - secretRef:
                name: osf-secrets
          env:
            - name: PORT
              value: "8032"
            - name: HISTORIAN_URL
              value: "http://historian:8030"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          startupProbe:
            httpGet:
              path: /health
              port: 8032
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8032
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8032
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: osf-kg-agent
  namespace: osf
  labels:
    app: osf-kg-agent
spec:
  selector:
    app: osf-kg-agent
  ports:
    - port: 8032
      targetPort: 8032
      protocol: TCP
