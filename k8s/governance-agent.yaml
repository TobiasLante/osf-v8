# OSF v9 — Governance Agent (LLM-based tool classification for RBAC)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-agent
  namespace: osf
  labels:
    app: governance-agent
    version: v9
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governance-agent
  template:
    metadata:
      labels:
        app: governance-agent
        version: v9
    spec:
      containers:
      - name: governance-agent
        image: 192.168.178.150:32000/osf-governance-agent:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8031
          name: http
        env:
        - name: GOVERNANCE_PORT
          value: "8031"
        - name: LLM_URL
          value: "http://192.168.178.120:5002"
        - name: LLM_MODEL
          value: "qwen2.5-14b-instruct"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8031
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8031
          periodSeconds: 10
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: governance-agent
  namespace: osf
  labels:
    app: governance-agent
spec:
  type: ClusterIP
  selector:
    app: governance-agent
  ports:
  - name: http
    port: 8031
    targetPort: 8031
