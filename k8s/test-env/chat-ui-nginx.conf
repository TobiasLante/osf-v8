server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Allow iframe embedding + connections to local gateway
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://192.168.178.110:* ws://192.168.178.110:* https://osf-api.zeroguess.ai wss://osf-api.zeroguess.ai; img-src 'self' data:; frame-ancestors 'self'" always;

    # Static HTML files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* -> local gateway (strip /api prefix)
    location /api/ {
        proxy_pass http://gateway:8012/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check proxy
    location /health {
        proxy_pass http://gateway:8012/health;
        proxy_set_header Host $host;
    }
}
