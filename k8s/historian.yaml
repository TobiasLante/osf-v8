# OSF v9 — Historian v2 Deployment (MQTT → TimescaleDB + History MCP + REST API)
# Runs on k8sserv4 (TimescaleDB node) for fast inserts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian
  namespace: osf
  labels:
    app: historian
    version: "8.8"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: historian
  template:
    metadata:
      labels:
        app: historian
        version: "8.8"
    spec:
      # Pin to k8sserv4 — the TimescaleDB node
      nodeSelector:
        kubernetes.io/hostname: k8sserv4
      containers:
      - name: historian
        image: 192.168.178.150:32000/osf-historian:8.8.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8030
          name: mcp
        envFrom:
        - configMapRef:
            name: osf-config
        env:
        - name: FACTORY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: FACTORY_DB_PASSWORD
        - name: HISTORIAN_DB_HOST
          value: "postgress-big-svc.bigdata.svc.cluster.local"
        - name: HISTORIAN_DB_PORT
          value: "5433"
        - name: HISTORIAN_DB_NAME
          value: "historian_db"
        - name: HISTORIAN_DB_USER
          value: "admin"
        - name: HISTORIAN_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: FACTORY_DB_PASSWORD
        - name: MQTT_BROKER_URL
          value: "mqtt://mqtt-broker.demo.svc.cluster.local:1883"
        - name: HISTORIAN_FLUSH_MS
          value: "5000"
        - name: HISTORIAN_MCP_PORT
          value: "8030"
        - name: HISTORIAN_BUFFER_DIR
          value: "/data/historian-buffer"
        volumeMounts:
        - name: buffer-storage
          mountPath: /data/historian-buffer
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        startupProbe:
          httpGet:
            path: /health
            port: 8030
          failureThreshold: 30
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8030
          periodSeconds: 30
          failureThreshold: 5
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8030
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      volumes:
      - name: buffer-storage
        emptyDir:
          sizeLimit: 200Mi

---
apiVersion: v1
kind: Service
metadata:
  name: historian
  namespace: osf
  labels:
    app: historian
spec:
  type: ClusterIP
  selector:
    app: historian
  ports:
  - name: mcp
    port: 8030
    targetPort: 8030
