# OSF v8 — Gateway Deployment + Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osf-gateway
  namespace: osf
  labels:
    app: osf-gateway
    version: v8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osf-gateway
  template:
    metadata:
      labels:
        app: osf-gateway
        version: v8
    spec:
      containers:
      - name: gateway
        image: 192.168.178.150:32000/osf-gateway:8.9.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8012
          name: http
        envFrom:
        - configMapRef:
            name: osf-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: JWT_SECRET
        - name: FACTORY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: FACTORY_DB_PASSWORD
        - name: ERP_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: ERP_DB_PASSWORD
        - name: QMS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: QMS_DB_PASSWORD
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: ANTHROPIC_API_KEY
        - name: LANGFUSE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: LANGFUSE_SECRET_KEY
        - name: LANGFUSE_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: LANGFUSE_PUBLIC_KEY
        - name: NR_POD_SECRET
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: nr-pod-secret
        - name: LLM_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: llm-encryption-key
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: REDIS_PASSWORD
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: RESEND_API_KEY
              optional: true
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: GITHUB_CLIENT_ID
              optional: true
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: GITHUB_CLIENT_SECRET
              optional: true
        - name: NODE_RED_SECRET
          valueFrom:
            secretKeyRef:
              name: osf-secrets
              key: NODE_RED_SECRET
              optional: true
        - name: APP_VERSION
          value: "8.9.0" # APP_VERSION
        - name: NODE_ENV
          value: "production"
        - name: FRONTEND_URL
          value: "https://openshopfloor.zeroguess.ai"
        - name: MQTT_BROKER_URL
          value: "mqtt://mqtt-broker.demo.svc.cluster.local:1883"
        - name: GATEWAY_INTERNAL_URL
          value: "http://osf-gateway.osf.svc.cluster.local:8012"
        - name: MCP_URL
          value: "http://factory-v3-fertigung.factory.svc.cluster.local:8020"
        - name: FACTORY_SIM_URL
          value: "http://factory-v3-fertigung.factory.svc.cluster.local:8888"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        startupProbe:
          httpGet:
            path: /health
            port: 8012
          periodSeconds: 5
          failureThreshold: 30
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8012
          periodSeconds: 30
          failureThreshold: 5
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8012
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

---
# Gateway Service — ClusterIP — external access via osf-gateway-external NodePort
apiVersion: v1
kind: Service
metadata:
  name: osf-gateway
  namespace: osf
  labels:
    app: osf-gateway
spec:
  type: ClusterIP
  selector:
    app: osf-gateway
  ports:
  - name: http
    port: 8012
    targetPort: 8012
