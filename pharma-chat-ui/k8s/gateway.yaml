apiVersion: apps/v1
kind: Deployment
metadata:
  name: p1-gateway
  namespace: osf
  labels:
    app: p1-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: p1-gateway
  template:
    metadata:
      labels:
        app: p1-gateway
    spec:
      containers:
        - name: p1-gateway
          image: 192.168.178.150:32000/p1-gateway:latest
          ports:
            - containerPort: 3101
          env:
            - name: PORT
              value: "3101"
            - name: MCP_URL
              value: "http://i3x-server-pharma.i3x.svc.cluster.local:8045"
            - name: CORS_ORIGINS
              value: "https://process1st.zeroguess.ai,https://process1st-chat.pages.dev,http://localhost:3100"
            - name: LLM_BASE_URL
              value: "http://192.168.178.120:5001/v1"
            - name: LLM_DEFAULT_MODEL
              value: "Qwen2.5-32B-Instruct-Q4_K_M.gguf"
            - name: RATE_LIMIT_MAX
              value: "60"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3101
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3101
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: p1-gateway
  namespace: osf
spec:
  type: NodePort
  selector:
    app: p1-gateway
  ports:
    - port: 3101
      targetPort: 3101
      nodePort: 31101
      protocol: TCP
