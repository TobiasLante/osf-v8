##
## Curated MQTT Broker — second broker for validated/enriched data
## Raw broker: 192.168.178.150:31883 (existing Factory Sim)
## Curated broker: port 31884 (this service)
##
## Usage: docker compose -f docker-compose.mqtt.yaml up -d
##

services:
  mqtt-curated:
    image: eclipse-mosquitto:2
    container_name: osf-mqtt-curated
    restart: unless-stopped
    ports:
      - "31884:1883"
      - "31885:9001"   # WebSocket
    volumes:
      - ./mosquitto-curated.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-curated-data:/mosquitto/data
      - mqtt-curated-log:/mosquitto/log
    networks:
      - osf-mqtt

networks:
  osf-mqtt:
    driver: bridge

volumes:
  mqtt-curated-data:
  mqtt-curated-log:
