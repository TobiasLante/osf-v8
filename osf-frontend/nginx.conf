resolver 10.152.183.10 valid=30s;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Static frontend pages
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Proxy /demo-chat/ → chat-ui service (same origin = cookie auth works)
    location /demo-chat/ {
        set $chat_ui http://osf-chat-ui.osf.svc.cluster.local;
        proxy_pass $chat_ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy /api/ → gateway (for demo-chat MCP calls etc.)
    location /api/ {
        set $gateway http://osf-gateway.osf.svc.cluster.local:8012;
        proxy_pass $gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy /health → gateway
    location /health {
        set $gw_health http://osf-gateway.osf.svc.cluster.local:8012;
        proxy_pass $gw_health/health;
        proxy_set_header Host $host;
    }
}
