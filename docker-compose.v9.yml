# ════════════════════════════════════════════════════════════════════════════
# OSF v9 — KG Builder + Web UI
# ════════════════════════════════════════════════════════════════════════════
# Start:  docker compose -f docker-compose.v9.yml up -d --build
# Logs:   docker compose -f docker-compose.v9.yml logs -f
# Stop:   docker compose -f docker-compose.v9.yml down
# ════════════════════════════════════════════════════════════════════════════

services:
  kg-builder:
    build: ./osf-kg-builder
    ports:
      - "8035:8035"
    environment:
      PORT: 8035
      DOMAIN: ${DOMAIN:-manufacturing}
      LLM_URL: ${LLM_URL:-http://192.168.178.120:5001}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-32b-instruct}
      MCP_PROXY_URL: ${MCP_PROXY_URL:-http://192.168.178.150:30834}
      ERP_DB_HOST: ${ERP_DB_HOST:-192.168.178.150}
      ERP_DB_PORT: ${ERP_DB_PORT:-30432}
      ERP_DB_NAME: ${ERP_DB_NAME:-erpdb}
      ERP_DB_USER: ${ERP_DB_USER:-admin}
      ERP_DB_PASSWORD: ${ERP_DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA:-llm_test_v3}
      GRAPH_NAME: ${GRAPH_NAME:-factory_graph}
      SM_PROFILE_URL: ${SM_PROFILE_URL:-}
      I3X_ENDPOINTS: ${I3X_ENDPOINTS:-}
      MTP_URLS: ${MTP_URLS:-}
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8035}
    ports:
      - "3001:3000"
    depends_on:
      - kg-builder
    restart: unless-stopped
